workflows:
  ios-release-no-codesign:
    name: iOS release build without code signing
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      vars:
        CM_FLUTTER_SCHEME: Runner
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build iOS app without code signing
        script: flutter build ios --release --no-codesign
      - name: Package IPA
        script: |
          set -e
          rm -rf build/ios/ipa
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa
          /usr/bin/zip -qry Runner.ipa Payload
    artifacts:
      - build/ios/ipa/Runner.ipa
